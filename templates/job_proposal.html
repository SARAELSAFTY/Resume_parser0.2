<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Match - CV Analyzer</title>
    <link rel="stylesheet" href="/static/style/styles.css">
    <style>
        body { padding: 20px; }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .upload-section { display: flex; flex-direction: column; }

        .section-title {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* override default upload-area padding for compact 2-col layout */
        .upload-grid .upload-area {
            padding: 50px 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            margin-bottom: 0;
        }

        .file-info {
            font-size: 12px;
            color: #606060;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #404040;
            text-align: center;
        }

        .file-name { color: #00d4ff; font-weight: 500; }

        /* Job details card */
        .job-details-card {
            background: rgba(0, 212, 255, 0.08);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            display: none;
        }

        .job-details-card.show { display: block; }

        .card-title {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .job-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .job-info-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }

        .job-info-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .job-info-value {
            font-size: 16px;
            color: #00ffff;
            font-weight: 600;
            word-break: break-word;
        }

        .match-status {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #404040;
            text-align: center;
        }

        .skills-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #404040;
        }

        .skills-column {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }

        .skills-column.matched-column { border-left-color: #00ff88; }

        .skills-column-title {
            font-size: 13px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .skill-match-stat { font-size: 12px; color: #00d4ff; margin-bottom: 10px; }
        .skill-match-stat.high { color: #00ff88; }

        @media (max-width: 768px) {
            .upload-grid { grid-template-columns: 1fr; }
            .skills-comparison { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>// JOB_MATCH</h1>
            <button class="back-btn" onclick="window.location.href='/'">← Back</button>
        </div>

        <div class="content" style="max-width:1000px">

            <!-- Upload grid -->
            <div class="upload-grid">
                <div class="upload-section">
                    <div class="section-title">Your CV</div>
                    <div class="upload-area" id="cvUploadArea">
                        <div class="upload-icon">📄</div>
                        <h3>Drop your CV</h3>
                        <p>or click to browse</p>
                        <div class="file-info">
                            Supports PDF, Word, or text
                            <div id="cvFileName" class="file-name"></div>
                        </div>
                        <input type="file" id="cvFileInput" class="file-input"
                               accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp">
                    </div>
                </div>

                <div class="upload-section">
                    <div class="section-title">Job Description</div>
                    <div class="upload-area" id="jobUploadArea">
                        <div class="upload-icon">📄</div>
                        <h3>Drop The other CV</h3>
                        <p>or click to browse</p>
                        <div class="file-info">
                            Supports image, PDF, or Word
                            <div id="jobFileName" class="file-name"></div>
                        </div>
                        <input type="file" id="jobFileInput" class="file-input"
                               accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp">
                    </div>
                </div>
            </div>

            <!-- Compare -->
            <div class="button-group">
                <button class="btn-primary" id="compareBtn" onclick="compareCV()" disabled>Match CV</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing CV against job requirements...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="job-details-card" id="jobDetailsCard"></div>

            <div class="result-container" id="result"></div>
        </div>
    </div>

    <script src="/static/js/job_proposal.js"></script>
</body>
</html>
